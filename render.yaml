services:
  - type: web
    name: essay-exam-app
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: streamlit run main.py --server.port $PORT --server.address 0.0.0.0 --server.headless true
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: TEACHER_PASSWORD
        sync: false
      - key: PYTHON_VERSION
        value: "3.11.6"
